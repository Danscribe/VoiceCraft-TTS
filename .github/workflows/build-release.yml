name: Build VoiceCraft Installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download offline voice pack
        run: |
          python bundle/prepare_offline_voices.py

      - name: Build with PyInstaller
        run: |
          pyinstaller bundle/pyinstaller_offline.spec --clean --noconfirm

      - name: Bundle voices into dist
        run: |
          $voices = "$env:USERPROFILE\.voicecraft_tts\piper_voices"
          $dest = "dist\VoiceCraft_TTS\voices"
          if (Test-Path $voices) {
            New-Item -ItemType Directory -Force -Path $dest
            Copy-Item -Path "$voices\*" -Destination $dest -Recurse -Force
          }

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" bundle\installer.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceCraft_Setup_${{ github.ref_name || github.event.inputs.version }}
          path: Output/VoiceCraft_Setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/VoiceCraft_Setup.exe
          name: VoiceCraft TTS ${{ github.ref_name }}
          body: |
            🎙 VoiceCraft TTS — Offline-ready Windows Installer

            ### What's Included
            - Standalone `.exe` — no Python installation needed
            - **30+ pre-bundled Piper voices** — works completely offline
            - Deepgram, Fish Audio, TopMedia AI integrations (cloud, API keys required)
            - Modern dark UI with mood & emotion controls

            ### Install
            1. Download `VoiceCraft_Setup.exe` below
            2. Run it and click through the wizard
            3. Launch from Desktop or Start Menu

            ### First Use
            - Select any voice with 🆓 icon to use offline instantly
            - Add API keys in Settings → API Keys to unlock cloud voices
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
