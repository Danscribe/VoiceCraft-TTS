name: Build VoiceCraft (Simple)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find project files
        id: find
        shell: pwsh
        run: |
          echo "=== LISTING ROOT FILES ==="
          Get-ChildItem -Path . -Depth 1 | Select-Object FullName
          echo ""
          echo "=== SEARCHING FOR main.py ==="
          $mainPy = Get-ChildItem -Path . -Recurse -Filter "main.py" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($mainPy) {
            $dir = $mainPy.DirectoryName
            echo "FOUND main.py at: $($mainPy.FullName)"
            echo "dir=$dir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            echo "main.py NOT FOUND anywhere!"
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build EXE
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pygame pydub requests pyperclip Pillow soundfile numpy pyinstaller
          pyinstaller main.py --name=VoiceCraft_TTS --onefile --windowed --clean --noconfirm --hidden-import=customtkinter --hidden-import=pygame --hidden-import=pydub --hidden-import=requests --hidden-import=pyperclip --hidden-import=PIL --hidden-import=soundfile --hidden-import=numpy

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: VoiceCraft_TTS_Portable
          path: ${{ steps.find.outputs.dir }}/dist/VoiceCraft_TTS.exe
